<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela :: Aplicando Estilo</title>
</head>
<body>
    <main>
        <h2>Estilizando tabelas</h2>
        <table>
            <tr>
                <th>Código</th>
                <th>Produto</th>
                <th>Preço</th>
            </tr>
            <tr>
                <td>001</td>
                <td>Notebook</td>
                <td>R$ 2.500,00</td>
            </tr>
            <tr>
                <td>002</td>
                <td>Tablet</td>
                <td>R$ 1.500,00</td>
            </tr>
            <tr>
                <td>003</td>
                <td>iPhone</td>
                <td>R$ 3.500,00</td>
            </tr>
            <tr>
                <td>004</td>
                <td>Nexus</td>
                <td>R$ 3.500,00</td>
            </tr>
        </table>
    </main>
</body>
</html>
