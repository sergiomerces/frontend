<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela :: Aplicando Estilo</title>
    <style rel="stylesheet">
        * {
            margin: 0;
            padding: 0;
        }

        body {
            margin: 20px;
            font: normal 16px "Trebuchet MS", Helvetica, sans-serif;
        }

        main {
            margin: 0 auto;
        }

        table {
            width: 600px;
            border-collapse: separate;
        }

        th, td {
            padding: 7px;
        }

        th {
            text-transform: uppercase;
            border-top: 1px solid #999;
            border-bottom: 1px solid #111;
            text-align: left;
            font-size: 90%;
            letter-spacing: 0.1em;
        }

        tr.alternado {
            background-color: #efefef;
        }

        tr:hover {
            background-color: skyblue;
        }

        .numero {
            text-align: right;
        }
    </style>
</head>
<body>
    <main>
        <h2>Estilizando tabelas</h2>
        <table>
            <tr>
                <th>Código</th>
                <th>Produto</th>
                <th class="numero">Preço</th>
            </tr>
            <tr class="alternado">
                <td>001</td>
                <td>Notebook</td>
                <td class="numero">R$ 2.500,00</td>
            </tr>
            <tr>
                <td>002</td>
                <td>Tablet</td>
                <td class="numero">R$ 1.500,00</td>
            </tr>
            <tr class="alternado">
                <td>003</td>
                <td>iPhone</td>
                <td class="numero">R$ 3.500,00</td>
            </tr>
            <tr>
                <td>004</td>
                <td>Nexus</td>
                <td class="numero">R$ 3.500,00</td>
            </tr>
        </table>
    </main>
</body>
</html>
