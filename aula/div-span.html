<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usando DIV e SPAN</title>
    <style type="text/css" rel="stylesheet">
        #topo {
            background: blue;
        }

        #conteudo {
            background: red;
        }

        .produto {
            background: gray;
            margin: 10px;
        }

        #rodape {
            background: green;
        }

        .azul {
            color:blue;
        }
    </style>
</head>
<body>
    <div id="topo">
        <img src="./img/logo-amazon.png" alt="logo amazon prime" width="200">
        <ul>
            <li>Home</li>
            <li>Produtos</li>
            <li>Contatos</li>
        </ul>
    </div>
    <div id="conteudo">
        <div class="produto">Produto1</div>
        <div class="produto">Produto2</div>
        <div class="produto">Produto3</div>
    </div>
    <div id="rodape">
        Todos os <span class="azul">direitos</span> reservados 
    </div>
</body>
</html>
