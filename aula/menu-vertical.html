<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8">
		<title>Construindo um Menu Lateral</title>
		<style rel="stylesheet">
			* {
				margin: 0;
				padding: 0;
			}
			
			body {
				background-color: white;
				color: black;
				font: normal, 16px, "Times New Roman", serif;
			}
			
			nav {
				background-color: yellow;
				padding: 0;
				width: 400px;
			}
			
			a {
				display: block;
				width: 400px;
				height: 40px;
				color: black;
				font-size: 1.2em;
				font-weight: bold;
				text-decoration: none;
				background-image: url(./img/seta.png);
				background-repeat: no-repeat;
				background-position: left center;
			}
			
			a:link, a:visited {
				color: black;
			}
			
			a:hover {
				background-color: orange;
				color: white;
				padding: 10px 0;
			}
			
			a:active {
				color: blue;
			}
			
			ul {
				list-style-type: none;
				margin: 0;
				padding: 0;
			}
			

			/*O Firefox 91.13.0 não renderiza o background usando shorthand*/
		
		</style>
	</head>
	<body>
		<nav>
			<ul>
				<li><a href="#" target="_self" rel="next" title="Página inicial">Home</a></li>
				<li><a href="#" target="_self" rel="next" title="Saiba mais sobre a organiação">Sobre</a></li>
				<li><a href="#" target="_self" rel="next" title="Conheça nossos serviços">Serviços</a></li>
				<li><a href="#" target="_self" rel="next" title="Nosso blog">Notícias</a></li>
				<li><a href="#" target="_self" rel="next" title="Fale conosco!">Contato</a></li>
			</ul>
		</nav>
	</body>
</html>
