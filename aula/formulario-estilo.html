<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário : Estilizando</title>
    <style rel="stylesheet">
        body {
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
        }

        fieldset {
            margin: 1em;
            padding: 1em;
            border: 1px solid #ccc;
            background-color: #f8f8f8;
        }

        legend {
            font-weight: bold;
        }

        label {
            display: block;
            cursor: pointer;
        }

        input[type="text"],
        input[type="email"] {
            width: 27em;
        }

        textarea {
            width: 30em;
            height: 10em;
        }

        inpu[type="radio"] {
            width: auto;
            margin-right: 1em;
        }
    </style>
</head>
<body>
    <main>
        <h2>Estilizando Formulários</h2>
        <form action="post">
            <fieldset>
                <legend>Detalhes contato</legend>
                    <div>
                        <label for="nome">Nome: </label>
                        <input type="text" name="nome" id="nome">
                    </div>
                <div>
                    <label for="email">E-Mail: </label>
                    <input type="email" name="email" id="nome">
                </div>
                <div>
                    <label for="url">URL: </label>
                    <input type="text" name="url" id="url">
                </div>
            </fieldset>
            <fieldset>
                <legend>Comentários</legend>
                <div>
                    <label for="mensagem">Mensagem: </label>
                </div>
                <textarea name="mensagem" id="mensagem" cols="50" rows="10"></textarea> 
            </fieldset>
            <fieldset>
                <legend>Lembrar de mim?</legend>
                <div>
                    <input type="radio" name="lembrar" id="lembrar-sim">Sim
                </div>
                <div>
                    <input type="radio" name="lembrar" id="lembrar-nao">Não
                </div>
            </fieldset>
        </form>
    </main>
</body>
</html>
