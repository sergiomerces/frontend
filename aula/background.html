<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background</title>
    <style type="text/css" rel="stylesheet">
        body {
            background-color: rgb(197, 194, 197);
            
        }

        div {
            width: 100%;
            height: 400px;
            background-image: url(./img/mario03.png);
            background-repeat: repeat-x;
            background-size:33%;
            background-position: left center;
        }

        /*  uma shorthand para background
        
            background: blue url(./img/maria03.png) repeat-x scroll center;
        */

    </style>
</head>
<body>
    <h1>Super Mario</h1>
    <div id="fundo">
        <!--aplicação de background-->
    </div>
</body>
</html>
