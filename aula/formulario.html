<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h2>Login</h2>
    <form>
        <p>Login:</p>
        <input type="text" name="login">
        <p>Senha:</p>
        <input type="password" name="password"><br><br>
        <input type="button" value="Logar">
    </form>
    <hr>
    <h2>Cadastre-se</h2>
    <form>
        <p><strong>Login:</strong> 
            <input type="text" name="login">
        </p>
        <p><strong>Sexo:</strong> 
            <input type="radio" name="sexo"> masculino 
            <input type="radio" name="sexo"> femenino
        </p>
        <p>
            <strong>UF: </strong>
            <select name="uf">
                <option value="ES">ES</option>
                <option value="MG">MG</option>
                <option value="RJ">RJ</option>
                <option value="SP">SP</option>
            </select>
        </p>
        <p>
            <strong>Interesses: </strong><br>
            <input type="checkbox" name="moveis"> móveis <br>
            <input type="checkbox" name="eletrodomésticos"> eletrodomésticos <br>
            <input type="checkbox" name="celulares"> celulares
        </p>
        <p><strong>Observações:</strong></p>
        <textarea name="observacoes" cols="80" rows="10"></textarea>
        <p>
            <input type="submit" value="Cadastrar"> 
        </p>
    </form>
</body>
</html>
