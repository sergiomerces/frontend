<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
</head>
<body>
    <h2>Contatos</h2>
    <table border="2" width="100%">
        <tr>
            <th>Fabricante</th>
            <th>Modelo</th>
            <th>Foto</th>
            <th>Ano</th>
            <th>Valor</th>
        </tr>
        <tr>
            <td><strong>Porshe</strong></td>
            <td>TX-2022A</td>
            <td><img src="./img/porsche-model.png" alt="Porshe TX2022A" width="200"></td>
            <td>2022</td>
            <td>US$ 108.000,00</td>
        </tr>
        <tr>
            <td rowspan="2">Desconto</td>
            <td colspan="4">Cupom R$ 10</td>
        </tr>
        <tr>
            <td colspan="4">Cupom R$ 12</td>
        </tr>
    </table>
</body>
</html>
